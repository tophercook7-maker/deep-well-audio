    font-size="13"
    font-weight="650"
    letter-spacing="0.14em"
  >DEEP WELL</text>
  <text
    x="54"
    y="42"
    fill="url(#dwaWordGold)"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
