<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 52" fill="none" role="img" aria-label="Deep Well Audio">
  <defs>
    <linearGradient id="dwaWordGold" x1="0" y1="0" x2="200" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ecd078"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#8a7020"/>
    </linearGradient>
  </defs>
  <!-- Mark -->
  <g transform="translate(2,2) scale(0.72)">
    <circle cx="32" cy="32" r="30" fill="#0c1424" stroke="url(#dwaWordGold)" stroke-width="1.25"/>
    <ellipse cx="32" cy="37" rx="15" ry="10.5" stroke="url(#dwaWordGold)" stroke-width="1.15" opacity="0.45"/>
    <path stroke="url(#dwaWordGold)" stroke-width="2" stroke-linecap="round" d="M32 17v15"/>
    <path stroke="url(#dwaWordGold)" stroke-width="1.5" stroke-linecap="round" d="M21 26.5c4.5-6.2 17.5-6.2 22 0" opacity="0.95"/>
